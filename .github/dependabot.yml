version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Bangkok"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps-web)"
      include: "scope"
    groups:
      web-security:
        applies-to: security-updates
        patterns: ["*"]
      web-version:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["patch", "minor"]

  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Bangkok"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps-api)"
      include: "scope"
    groups:
      api-security:
        applies-to: security-updates
        patterns: ["*"]
      api-version:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["patch", "minor"]
